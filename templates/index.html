<!DOCTYPE html>
<html>
<head>
  <title>Insider Threat Detection</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <h1 class="text-center mb-4">Insider Threat Detection System</h1>

  <div class="card p-4">
    <form action="/predict" method="post" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="dataset" class="form-label">Upload Dataset (CSV)</label>
        <input type="file" class="form-control" id="dataset" name="dataset" required>
      </div>
      <button type="submit" class="btn btn-primary">Detect Threats</button>
    </form>
  </div>
</div>
</body>
</html>
